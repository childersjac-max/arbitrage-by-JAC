openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: line-tracker
    description: Line Tracker — bet slate from childersjac-max/Line-Tracker-Model
  - name: nba-model
    description: NBA Model — predictions from childersjac-max/nba-betting-model
  - name: arbitrage
    description: Arbitrage — live opportunities from OddsJam

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /line-tracker/slate:
    get:
      operationId: getLineTrackerSlate
      tags: [line-tracker]
      summary: Get today's bet slate
      description: Fetches and parses bet_slate_latest.csv from the Line-Tracker-Model GitHub repo
      responses:
        "200":
          description: Bet slate with metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineTrackerSlateResponse"
        "500":
          description: Failed to fetch slate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /line-tracker/patterns:
    get:
      operationId: getLineTrackerPatterns
      tags: [line-tracker]
      summary: Get discovered betting patterns
      description: Fetches patterns.json from the Line-Tracker-Model GitHub repo
      responses:
        "200":
          description: Patterns data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternsResponse"
        "500":
          description: Failed to fetch patterns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /nba-model/predictions:
    get:
      operationId: getNbaModelPredictions
      tags: [nba-model]
      summary: Get today's NBA predictions
      description: Fetches predictions.json from the nba-betting-model GitHub repo
      responses:
        "200":
          description: NBA predictions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NbaPredictionsResponse"
        "500":
          description: Failed to fetch predictions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /nba-model/bet-log:
    get:
      operationId: getNbaModelBetLog
      tags: [nba-model]
      summary: Get NBA bet log
      description: Fetches bet_log.json from the nba-betting-model GitHub repo
      responses:
        "200":
          description: NBA bet log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NbaBetLogResponse"
        "500":
          description: Failed to fetch bet log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /nba-model/backtest:
    get:
      operationId: getNbaModelBacktest
      tags: [nba-model]
      summary: Get NBA backtest metrics
      description: Fetches backtest.json from the nba-betting-model GitHub repo
      responses:
        "200":
          description: NBA backtest metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NbaBacktestResponse"
        "500":
          description: Failed to fetch backtest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /arbitrage/opportunities:
    get:
      operationId: getArbitrageOpportunities
      tags: [arbitrage]
      summary: Get live arbitrage opportunities
      description: >
        Calls OddsJam API using ODDSJAM_API_KEY env var to find live arbitrage
        opportunities. Falls back gracefully if the key is not configured.
      parameters:
        - name: sport
          in: query
          required: false
          schema:
            type: string
          description: Filter by sport key (e.g. basketball_nba)
        - name: market
          in: query
          required: false
          schema:
            type: string
          description: Filter by market (h2h, spreads, totals)
      responses:
        "200":
          description: List of arbitrage opportunities sorted by profit %
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArbitrageResponse"
        "500":
          description: Failed to fetch opportunities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    BetSlateRow:
      type: object
      properties:
        sport:
          type: string
        market:
          type: string
        side:
          type: string
        matchup:
          type: string
        game_time:
          type: string
        hours_to_game:
          type: number
        american_odds:
          type: number
        american_odds_display:
          type: string
        book:
          type: string
        model_prob:
          type: number
        fair_prob:
          type: number
        edge_pct:
          type: number
        ev_pct:
          type: number
        bet_pct:
          type: number
        bet_usd:
          type: number
        confidence:
          type: string
        signals:
          type: string
        n_signals:
          type: number
        is_arb_side:
          type: string
        arb_partner_book:
          type: string
        arb_partner_price:
          type: string
        arb_margin_pct:
          type: number
        injured_players:
          type: string
        side_injury_score:
          type: number
        opp_injury_score:
          type: number

    LineTrackerSlateResponse:
      type: object
      properties:
        bets:
          type: array
          items:
            $ref: "#/components/schemas/BetSlateRow"
        total:
          type: integer
        fetched_at:
          type: string
      required:
        - bets
        - total
        - fetched_at

    PatternsResponse:
      type: object
      description: Raw patterns.json from Line-Tracker-Model (pass-through)
      additionalProperties: true

    NbaPrediction:
      type: object
      properties:
        game_id:
          type: string
        matchup:
          type: string
        team:
          type: string
        market:
          type: string
        side:
          type: string
        odds:
          type: number
        model_prob:
          type: number
        edge:
          type: number
        kelly_pct:
          type: number
        grade:
          type: string
        game_time:
          type: string
      additionalProperties: true

    NbaPredictionsResponse:
      type: object
      properties:
        predictions:
          type: array
          items:
            $ref: "#/components/schemas/NbaPrediction"
        total:
          type: integer
        fetched_at:
          type: string
      required:
        - predictions
        - total
        - fetched_at

    NbaBetLogResponse:
      type: object
      description: Raw bet log JSON from nba-betting-model
      properties:
        bets:
          type: array
          items:
            type: object
            additionalProperties: true
        fetched_at:
          type: string
      required:
        - bets
        - fetched_at

    NbaBacktestResponse:
      type: object
      description: Backtest metrics from nba-betting-model
      properties:
        roi_pct:
          type: number
        win_rate:
          type: number
        total_bets:
          type: integer
        total_pnl:
          type: number
        sharpe:
          type: number
        max_drawdown_pct:
          type: number
        by_market:
          type: object
          additionalProperties: true
        bankroll_history:
          type: array
          items:
            type: object
            additionalProperties: true
        fetched_at:
          type: string
      additionalProperties: true

    ArbLeg:
      type: object
      properties:
        side:
          type: string
        book:
          type: string
        price:
          type: number
        line:
          type: number
          nullable: true
        stake:
          type: number
          nullable: true
      required:
        - side
        - book
        - price

    ArbitrageOpportunity:
      type: object
      properties:
        event_id:
          type: string
        sport_key:
          type: string
        commence_time:
          type: string
        home_team:
          type: string
        away_team:
          type: string
        market:
          type: string
        margin_pct:
          type: number
        legs:
          type: array
          items:
            $ref: "#/components/schemas/ArbLeg"
      required:
        - sport_key
        - home_team
        - away_team
        - market
        - margin_pct
        - legs

    ArbitrageResponse:
      type: object
      properties:
        opportunities:
          type: array
          items:
            $ref: "#/components/schemas/ArbitrageOpportunity"
        total:
          type: integer
        fetched_at:
          type: string
        configured:
          type: boolean
          description: False if ODDSJAM_API_KEY is not set
        access_denied:
          type: boolean
          description: True if the API key lacks access to the arbitrage endpoint
        access_denied_reason:
          type: string
          description: Human-readable reason for access denial
      required:
        - opportunities
        - total
        - fetched_at
        - configured
